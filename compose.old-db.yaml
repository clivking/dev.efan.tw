services:
  db-old:
    image: postgres:17-alpine
    container_name: efan-old-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: efan_dev_old
      POSTGRES_USER: efan_old
      POSTGRES_PASSWORD: change-me-old
    ports:
      - "5433:5432"
    volumes:
      - efan_old_postgres:/var/lib/postgresql/data
      - ./import-review/db-old:/backup:rw

volumes:
  efan_old_postgres:
