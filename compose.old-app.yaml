services:
  app-old:
    build:
      context: ./import-review/code-old/efan.tw-old/web
      dockerfile: Dockerfile.dev
    container_name: efan-old-app
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx next dev --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    env_file:
      - ./import-review/code-old/efan.tw-old/web/.env.compose-old
    volumes:
      - ./import-review/code-old/efan.tw-old/web:/app
      - efan_old_app_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  efan_old_app_node_modules:
