services:
  db-work:
    image: postgres:17-alpine
    container_name: efan-work-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: efan_working_copy
      POSTGRES_USER: efan_work
      POSTGRES_PASSWORD: change-me-work
    ports:
      - "5433:5432"
    volumes:
      - efan_work_postgres:/var/lib/postgresql/data

  app-work:
    build:
      context: ./app-legacy-base
      dockerfile: Dockerfile.dev
    container_name: efan-work-app
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx next dev --hostname 0.0.0.0 --port 3002"
    depends_on:
      - db-work
    ports:
      - "5100:3002"
    env_file:
      - ./app-legacy-base/.env.compose-work
    volumes:
      - ./app-legacy-base:/app
      - efan_work_app_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  efan_work_postgres:
  efan_work_app_node_modules:
